entryPoints:
  web:
    address: ":80"

  websecure:
    address: ":443"

certificatesResolvers:
  letsencrypt:
    acme:
      email: "limpopo113@gmail.com"
      storage: /letsencrypt/acme.json
      dnsChallenge:
        provider: regru
        propagation:
          delayBeforeChecks: 30

providers:
  docker:
    exposedByDefault: false
    endpoint: "unix:///var/run/docker.sock"
    watch: true
  file:
    filename: /etc/traefik/traefik-dynamic.yml
    watch: true

api:
  dashboard: false

